<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Qantid — Discover & Book Events Across Africa</title>
    <meta name="description" content="Africa's #1 event ticketing platform. Discover concerts, festivals, conferences and cultural events across Lagos, Nairobi, Accra, Johannesburg and 50+ African cities. Book tickets securely." />
    <meta name="author" content="Qantid" />
    <meta name="keywords" content="events in Africa, African events, buy tickets Africa, concerts Lagos, festivals Nairobi, events Accra, ticketing platform Africa, Qantid, book events online Africa, event management Africa" />
    <meta name="theme-color" content="#E86833" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-512.png" />
    <link rel="canonical" href="https://qantid.com/" />

    <!-- Open Graph -->
    <meta property="og:title" content="Qantid — Discover & Book Events Across Africa" />
    <meta property="og:description" content="Africa's #1 event ticketing platform. Find concerts, festivals, conferences and cultural events across 50+ African cities." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://qantid.com/" />
    <meta property="og:image" content="https://qantid.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Qantid" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@qantid" />
    <meta name="twitter:title" content="Qantid — Discover & Book Events Across Africa" />
    <meta name="twitter:description" content="Africa's #1 event ticketing platform. Book concerts, festivals & conferences across 50+ cities." />
    <meta name="twitter:image" content="https://qantid.com/og-image.jpg" />

    <!-- JSON-LD Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Qantid",
      "url": "https://qantid.com",
      "logo": "https://qantid.com/og-image.jpg",
      "description": "Africa's premier event discovery and ticketing platform",
      "sameAs": [],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "url": "https://qantid.com/contact"
      }
    }
    </script>

    <!-- JSON-LD WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Qantid",
      "url": "https://qantid.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://qantid.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
